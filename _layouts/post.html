---
layout: default
---
<article>
  <h1>{{ page.title }}</h1>
  <div class="post-meta">
    {{ page.date | date: "%B %d, %Y" }}
    {% if page.tags.size > 0 %} · {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}{% endif %}
    {% if page.summary %}<p style="margin-top:.5rem;font-style:italic">{{ page.summary }}</p>{% endif %}
  </div>
  {{ content }}
</article>
