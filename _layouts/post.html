---
layout: default
---
<article>
  <h1>{{ page.title }}</h1>
  <div class="post-meta">
    {{ page.date | date: "%B %d, %Y" }}
    {% if page.tags.size > 0 %} · {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}{% endif %}
    {% if page.summary %}<p style="margin-top:.5rem;font-style:italic">{{ page.summary }}</p>{% endif %}
  </div>
  {{ content }}
  <div class="author-badge" style="margin-top:2rem;padding-top:1rem;border-top:1px solid #eee">
    <a href="https://early-eagles.vercel.app/eagle/0" target="_blank" rel="noopener">
      <img src="https://early-eagles.vercel.app/api/badge/SP3JR7JXFT7ZM9JKSQPBQG1HPT0D365MA5TN0P12E?alias=Iskander" alt="Early Eagle #0 — Legendary" style="max-width:320px" />
    </a>
  </div>
</article>
